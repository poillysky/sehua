name: Build and push images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR: ghcr.io
  DOCKERHUB_USER: poillysky
  # 当前发版号；下次发版改为 1.0.3 等，旧版本标签仍保留在 Hub
  RELEASE_TAG: "1.1.10"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR }}/${{ github.repository_owner }}/sehuatang-backend
            ${{ env.DOCKERHUB_USER }}/sehuatang-backend
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/admin/package-lock.json

      - name: Install & build admin
        working-directory: frontend/admin
        run: |
          npm install --no-audit --no-fund
          npx vite build
          test -d dist

      - name: Stage runtime context
        run: |
          mkdir -p /tmp/admin-runtime/deploy
          cp -a frontend/admin/dist /tmp/admin-runtime/dist
          cp frontend/admin/deploy/nginx.conf /tmp/admin-runtime/deploy/nginx.conf
          cp frontend/admin/Dockerfile.runtime /tmp/admin-runtime/Dockerfile

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR }}/${{ github.repository_owner }}/sehuatang-admin
            ${{ env.DOCKERHUB_USER }}/sehuatang-admin
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: /tmp/admin-runtime
          file: /tmp/admin-runtime/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          platforms: linux/amd64

  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: next-web/package-lock.json

      - name: Install & build search
        working-directory: next-web
        env:
          BUILD_MODE: standalone
          DOCKER_BUILD: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          npm_config_registry: https://registry.npmjs.org/
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps
          node -e "console.log('next', require('next/package.json').version)"
          node -e "try{require('@node-rs/jieba');console.log('jieba ok')}catch(e){console.warn('jieba',e.message)}"
          NODE_ENV=production node node_modules/next/dist/bin/next build
          test -f .next/standalone/server.js
          test -d .next/static

      - name: Stage runtime context
        run: |
          mkdir -p /tmp/search-runtime/public /tmp/search-runtime/.next
          cp -a next-web/public/. /tmp/search-runtime/public/
          cp -a next-web/.next/standalone/. /tmp/search-runtime/
          mkdir -p /tmp/search-runtime/.next/static
          cp -a next-web/.next/static/. /tmp/search-runtime/.next/static/
          cp next-web/Dockerfile.runtime /tmp/search-runtime/Dockerfile
          test -f /tmp/search-runtime/server.js

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR }}/${{ github.repository_owner }}/sehuatang-search
            ${{ env.DOCKERHUB_USER }}/sehuatang-search
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: /tmp/search-runtime
          file: /tmp/search-runtime/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=search
          cache-to: type=gha,mode=max,scope=search
          platforms: linux/amd64
