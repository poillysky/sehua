# sehuatang NAS 全栈（只 pull 镜像，不在 NAS 上 build）
# 用法:
#   1. 把下面 GHCR 用户名、密码、数据路径改成你的实际值
#   2. docker login ghcr.io
#   3. docker compose -f docker-compose.nas.yml pull
#   4. docker compose -f docker-compose.nas.yml up -d
#
# 持久化（按需改成 NAS 绝对路径）:
#   ./data/postgres  → PG
#   ./data/backend   → cookies、预览图
#   ./data/search    → next-web p115-config.json
#   ./data/search-cache → .next/cache（可丢）

name: sehuatang

services:
  postgres:
    image: postgres:16-alpine
    container_name: sehuatang-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ed2k"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/1551564725zhu-cell/sehuatang-backend:latest
    container_name: sehuatang-backend
    restart: always
    ports:
      - "8080:8080"
    shm_size: 2g
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      TZ: Asia/Shanghai
      AUTH_REQUIRED: "true"
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
      CORS_ORIGINS: ""
      WEB_CRAWLER_PROXY: ""
      SEARCH_FRONTEND_URL: http://127.0.0.1:3010
    volumes:
      - ./data/backend:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: ghcr.io/1551564725zhu-cell/sehuatang-admin:latest
    container_name: sehuatang-admin
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

  search:
    image: ghcr.io/1551564725zhu-cell/sehuatang-search:latest
    container_name: sehuatang-search
    restart: always
    ports:
      - "3010:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_DB_URL: postgres://postgres:postgres@postgres:5432/ed2k
      TZ: Asia/Shanghai
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      TRANSLATE_API_URL: ""
      TRANSLATE_FALLBACK: "1"
    volumes:
      - ./data/search:/app/data
      - ./data/search-cache:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default:
    name: sehuatang-nas-network
