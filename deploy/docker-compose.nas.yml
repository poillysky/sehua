# 全栈部署目录：/vol1/1000/Docker/sehuatang/
#
# 本机放：
#   docker-compose.nas.yml
#   update.sh（可选）
#   data/postgres|backend|backups|search|search-cache（见下方卷）
#   data/backups/ → 资源库单份备份 ed2k-resources.sql.gz
#
# 从旧 ed2k 迁移库数据（只做一次，停旧栈后执行）:
#   mkdir -p /vol1/1000/Docker/sehuatang/data
#   cp -a /vol1/1000/Docker/ed2k/postgres /vol1/1000/Docker/sehuatang/data/postgres
#   # 确认拷完后再删旧目录；切勿两边同时挂同一份正在运行的库
#
# 启动:
#   docker compose -f docker-compose.nas.yml pull
#   docker compose -f docker-compose.nas.yml up -d
# 访问: 搜索 :3010  管理 :8082

name: sehuatang

services:
  postgres:
    image: postgres:16-alpine
    container_name: sehuatang-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    volumes:
      - /vol1/1000/Docker/sehuatang/data/postgres:/var/lib/postgresql/data
    shm_size: 1g
    sysctls:
      - kernel.shmmax=1073741824
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ed2k"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  backend:
    image: poillysky/sehuatang-backend:1.1.10
    container_name: sehuatang-backend
    restart: always
    # 不对宿主机暴露 8080：浏览器走 admin:8082，由 Nginx 反代到 backend:8080
    shm_size: 2g
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      TZ: Asia/Shanghai
      AUTH_REQUIRED: "true"
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
      CORS_ORIGINS: ""
      WEB_CRAWLER_PROXY: ""
      SEARCH_FRONTEND_URL: http://127.0.0.1:3010
      # 资源库备份目录（与下方卷一致；宿主机: data/backups/ed2k-resources.sql.gz）
      BACKUP_DIR: /app/data/backups
    volumes:
      - /vol1/1000/Docker/sehuatang/data/backend:/app/data
      # 单独挂备份目录，便于在 NAS 上单独拷贝/快照（覆盖 backend 卷内的 backups 子路径）
      - /vol1/1000/Docker/sehuatang/data/backups:/app/data/backups
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: poillysky/sehuatang-admin:1.1.10
    container_name: sehuatang-admin
    restart: always
    ports:
      - "8082:80"
    depends_on:
      - backend

  search:
    image: poillysky/sehuatang-search:1.1.10
    container_name: sehuatang-search
    restart: always
    ports:
      - "3010:3000"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_DB_URL: postgres://postgres:postgres@postgres:5432/ed2k
      TRANSLATE_API_URL: ""
      TRANSLATE_FALLBACK: "1"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - /vol1/1000/Docker/sehuatang/data/search:/app/data
      - /vol1/1000/Docker/sehuatang/data/search-cache:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  default:
    name: sehuatang-network
