# sehuatang NAS 全栈（只 pull 镜像，不在 NAS 上 build）
# 用法:
#   cp .env.example .env   # 改密码与 GHCR_OWNER
#   docker login ghcr.io
#   docker compose -f docker-compose.nas.yml pull
#   docker compose -f docker-compose.nas.yml up -d
#
# 持久化一览（${DATA_DIR:-./data}）:
#   postgres/   → PG 数据文件
#   backend/    → cookies、预览图、可选 auth.sqlite、爬虫运行时
#   search/     → next-web 115 配置 (p115-config.json) 等 /app/data
# admin 为纯静态，无需卷。

name: sehuatang

services:
  postgres:
    image: postgres:16-alpine
    container_name: sehuatang-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ed2k}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/${GHCR_OWNER}/sehuatang-backend:${IMAGE_TAG:-latest}
    container_name: sehuatang-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    shm_size: 2g
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ed2k}
      TZ: Asia/Shanghai
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      WEB_CRAWLER_PROXY: ${WEB_CRAWLER_PROXY:-}
      SEARCH_FRONTEND_URL: ${SEARCH_FRONTEND_URL:-http://127.0.0.1:3008}
    volumes:
      # cookies.json / uploads/previews / 可选 auth.db
      - ${DATA_DIR:-./data}/backend:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: ghcr.io/${GHCR_OWNER}/sehuatang-admin:${IMAGE_TAG:-latest}
    container_name: sehuatang-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8081}:80"
    depends_on:
      - backend

  search:
    image: ghcr.io/${GHCR_OWNER}/sehuatang-search:${IMAGE_TAG:-latest}
    container_name: sehuatang-search
    restart: unless-stopped
    ports:
      - "${SEARCH_PORT:-3008}:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ed2k}
      POSTGRES_DB_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ed2k}
      TZ: Asia/Shanghai
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      TRANSLATE_API_URL: ${TRANSLATE_API_URL:-}
      TRANSLATE_FALLBACK: ${TRANSLATE_FALLBACK:-1}
    volumes:
      # 必须：115 Cookie/目录配置 → data/p115-config.json
      - ${DATA_DIR:-./data}/search:/app/data
      # 可选：Next 构建缓存（加速重启，丢了也不影响功能）
      - ${DATA_DIR:-./data}/search-cache:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default:
    name: sehuatang-nas-network
