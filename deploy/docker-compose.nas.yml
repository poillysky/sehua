# 替换现网 ed2k-next-web + ed2k-postgres 的全栈版
# 保留数据库：继续用 /vol1/1000/Docker/ed2k/postgres（切勿删该目录）
#
# 切换步骤（在旧 compose 同级或本文件所在目录）:
#   1. 旧栈: docker compose -f <旧yml> down
#      （不要加 -v，不要删 /vol1/1000/Docker/ed2k/postgres）
#   2. 国内可直接 pull Docker Hub（一般比 ghcr.io 快）
#   3. docker compose -f docker-compose.nas.yml pull
#   4. docker compose -f docker-compose.nas.yml up -d
#   5. 检查: 搜索 http://NAS_IP:3010  管理 http://NAS_IP:8082
#      （backend 不映射宿主机端口，健康检查经管理端 /health 或容器内访问）
#
# 说明:
#   - postgres 容器名改为 sehuatang-postgres，数据目录与账号不变 → 库数据保留
#   - 已去掉 postgres-init 挂载（旧库非空，init 也不会执行；避免误挂）
#   - 业务镜像：Docker Hub poillysky/sehuatang-*（同时仍推 GHCR）

name: sehuatang

services:
  postgres:
    image: postgres:16-alpine
    container_name: sehuatang-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
    volumes:
      # ★ 与现网一致：沿用旧数据目录
      - /vol1/1000/Docker/ed2k/postgres:/var/lib/postgresql/data
    shm_size: 1g
    sysctls:
      - kernel.shmmax=1073741824
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ed2k"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  backend:
    image: poillysky/sehuatang-backend:latest
    container_name: sehuatang-backend
    restart: always
    # 不对宿主机暴露 8080：浏览器走 admin:8081，由 Nginx 反代到 backend:8080
    shm_size: 2g
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      TZ: Asia/Shanghai
      AUTH_REQUIRED: "true"
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
      CORS_ORIGINS: ""
      WEB_CRAWLER_PROXY: ""
      SEARCH_FRONTEND_URL: http://127.0.0.1:3010
    volumes:
      - /vol1/1000/Docker/ed2k/backend:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: poillysky/sehuatang-admin:latest
    container_name: sehuatang-admin
    restart: always
    ports:
      - "8082:80"
    depends_on:
      - backend

  search:
    image: poillysky/sehuatang-search:latest
    container_name: sehuatang-search
    restart: always
    ports:
      - "3010:3000"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ed2k
      POSTGRES_DB_URL: postgres://postgres:postgres@postgres:5432/ed2k
      TRANSLATE_API_URL: ""
      TRANSLATE_FALLBACK: "1"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    dns:
      - 223.5.5.5
      - 8.8.8.8
    volumes:
      - /vol1/1000/Docker/ed2k/search:/app/data
      - /vol1/1000/Docker/ed2k/search-cache:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

networks:
  default:
    name: sehuatang-network
